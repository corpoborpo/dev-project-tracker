<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev Project Tracker</title>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────── */
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3350;
      --text:      #e2e8f0;
      --muted:     #8892a4;
      --accent:    #6c8ef5;

      --green:     #22c55e;
      --green-bg:  #052e16;
      --green-dim: #166534;
      --amber:     #f59e0b;
      --amber-bg:  #1c1200;
      --amber-dim: #854d0e;
      --red:       #ef4444;
      --red-bg:    #1f0707;
      --red-dim:   #991b1b;

      --heat0: #161b2e;
      --heat1: #1e3a5f;
      --heat2: #2563a8;
      --heat3: #3b82f6;
      --heat4: #93c5fd;

      --radius:    10px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* ── Reset & base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 24px 64px;
      line-height: 1.6;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ─────────────────────────────────────────────────────── */
    .page { max-width: 1100px; margin: 0 auto; }

    /* ── Header ─────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .header-left h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .header-left p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }
    .header-meta {
      text-align: right;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.8;
    }
    .header-meta strong { color: var(--text); }

    /* ── Section headings ───────────────────────────────────────────── */
    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── Status pills ───────────────────────────────────────────────── */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .pill.green  { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-dim);  }
    .pill.green::before  { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .pill.amber  { background: var(--amber-bg);  color: var(--amber);  border: 1px solid var(--amber-dim);  }
    .pill.amber::before  { background: var(--amber); box-shadow: 0 0 5px var(--amber); }
    .pill.red    { background: var(--red-bg);    color: var(--red);    border: 1px solid var(--red-dim);    }
    .pill.red::before    { background: var(--red);   box-shadow: 0 0 5px var(--red);   }

    .phase-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* ── Project cards grid ─────────────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--accent); }
    .card.green { border-top: 3px solid var(--green); }
    .card.amber { border-top: 3px solid var(--amber); }
    .card.red   { border-top: 3px solid var(--red);   }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .card-title-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .card-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }
    .card-version {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: monospace;
      padding: 1px 6px;
      background: var(--surface2);
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .card-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .meta-item { font-size: 0.8rem; }
    .meta-label { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .meta-value { color: var(--text); font-weight: 500; }

    .card-notes {
      font-size: 0.825rem;
      color: var(--text);
      background: var(--surface2);
      border-left: 3px solid var(--border);
      padding: 10px 14px;
      border-radius: 0 6px 6px 0;
    }

    .subtasks { display: flex; flex-direction: column; gap: 4px; }
    .subtask-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.825rem;
      color: var(--muted);
    }
    .subtask-item::before {
      content: '↳';
      color: var(--amber);
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Heat map ───────────────────────────────────────────────────── */
    .heatmap-section { margin-bottom: 48px; }
    .heatmap-project { margin-bottom: 28px; }
    .heatmap-project-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .heatmap-label {
      font-size: 0.85rem;
      font-weight: 600;
      font-family: monospace;
      color: var(--text);
    }

    .heatmap-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 20px 16px;
      overflow-x: auto;
    }
    .heatmap-months {
      display: flex;
      gap: 0;
      margin-bottom: 4px;
      padding-left: 28px;
    }
    .heatmap-month-label {
      font-size: 0.65rem;
      color: var(--muted);
      flex: 1;
      text-align: left;
    }
    .heatmap-body { display: flex; gap: 4px; align-items: flex-start; }
    .heatmap-days {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding-top: 1px;
    }
    .heatmap-day-label {
      font-size: 0.6rem;
      color: var(--muted);
      height: 11px;
      line-height: 11px;
      width: 22px;
      text-align: right;
      padding-right: 4px;
    }
    .heatmap-grid { display: flex; gap: 3px; }
    .heatmap-col { display: flex; flex-direction: column; gap: 3px; }
    .heatmap-cell {
      width: 11px;
      height: 11px;
      border-radius: 2px;
      background: var(--heat0);
      cursor: default;
      transition: opacity 0.1s;
      position: relative;
    }
    .heatmap-cell:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2235;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.65rem;
      padding: 3px 7px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
    }
    .heatmap-cell[data-level="1"] { background: var(--heat1); }
    .heatmap-cell[data-level="2"] { background: var(--heat2); }
    .heatmap-cell[data-level="3"] { background: var(--heat3); }
    .heatmap-cell[data-level="4"] { background: var(--heat4); }

    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      justify-content: flex-end;
    }
    .heatmap-legend span { font-size: 0.65rem; color: var(--muted); }
    .legend-cell {
      width: 11px; height: 11px; border-radius: 2px;
    }

    /* ── Timeline ───────────────────────────────────────────────────── */
    .timeline-section { margin-bottom: 48px; }
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .timeline-entry {
      display: flex;
      gap: 16px;
      position: relative;
    }
    .timeline-entry::before {
      content: '';
      position: absolute;
      left: 71px;
      top: 24px;
      bottom: -8px;
      width: 1px;
      background: var(--border);
    }
    .timeline-entry:last-child::before { display: none; }
    .timeline-left {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      width: 64px;
      flex-shrink: 0;
      padding-top: 12px;
    }
    .timeline-date { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
    .timeline-dot-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 16px;
      flex-shrink: 0;
      padding-top: 16px;
    }
    .timeline-dot {
      width: 8px; height: 8px; border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface2);
      flex-shrink: 0;
    }
    .timeline-dot.green { background: var(--green); border-color: var(--green); }
    .timeline-dot.amber { background: var(--amber); border-color: var(--amber); }
    .timeline-dot.red   { background: var(--red);   border-color: var(--red);   }
    .timeline-content {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .timeline-project {
      font-size: 0.7rem;
      font-family: monospace;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .timeline-note {
      font-size: 0.85rem;
      color: var(--text);
    }

    /* ── Footer ─────────────────────────────────────────────────────── */
    .footer {
      border-top: 1px solid var(--border);
      padding-top: 20px;
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    /* ── Loading / error ────────────────────────────────────────────── */
    #loading, #error {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    #error { color: var(--red); }
  </style>
</head>
<body>
<div class="page">
  <div id="loading">Loading tracker…</div>
  <div id="error" style="display:none"></div>
  <div id="app" style="display:none"></div>
</div>

<script>
/* ── Helpers ───────────────────────────────────────────────────────── */
const el = (tag, cls, inner) => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (inner != null) e.innerHTML = inner;
  return e;
};
const div = (cls, inner) => el('div', cls, inner);

function statusLabel(s) {
  return { green: 'On Track', amber: 'In Progress', red: 'At Risk' }[s] ?? s;
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function daysAgo(iso) {
  if (!iso) return '';
  const diff = Math.round((Date.now() - new Date(iso + 'T00:00:00').getTime()) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return '1 day ago';
  if (diff < 30) return `${diff} days ago`;
  const w = Math.round(diff / 7);
  if (w < 8) return `${w}w ago`;
  const m = Math.round(diff / 30);
  return `${m}mo ago`;
}

/* ── Project card ──────────────────────────────────────────────────── */
function buildCard(p) {
  const card = div(`card ${p.status}`);

  // Header
  const hdr = div('card-header');
  const titleRow = div('card-title-row');
  titleRow.appendChild(el('span', 'card-name', p.name));
  if (p.currentVersion) titleRow.appendChild(el('span', 'card-version', 'v' + p.currentVersion));
  titleRow.appendChild(el('span', 'phase-badge', p.phase));
  const pillEl = el('span', `pill ${p.status}`, statusLabel(p.status));
  hdr.appendChild(titleRow);
  hdr.appendChild(pillEl);
  card.appendChild(hdr);

  // Description
  card.appendChild(el('p', 'card-desc', p.description));

  // Meta
  const meta = div('card-meta');
  const mkMeta = (label, value) => {
    const item = div('meta-item');
    item.appendChild(div('meta-label', label));
    item.appendChild(div('meta-value', value || '—'));
    return item;
  };
  meta.appendChild(mkMeta('Users', p.users));
  meta.appendChild(mkMeta('Owner', p.owner));
  meta.appendChild(mkMeta('Last activity', fmtDate(p.lastActivity) + (p.lastActivity ? ` <span style="color:var(--muted);font-size:0.7rem">(${daysAgo(p.lastActivity)})</span>` : '')));
  card.appendChild(meta);

  // Notes
  if (p.notes) card.appendChild(el('div', 'card-notes', p.notes));

  // Subtasks
  if (p.subtasks && p.subtasks.length) {
    const sub = div('subtasks');
    p.subtasks.forEach(t => sub.appendChild(el('div', 'subtask-item', t)));
    card.appendChild(sub);
  }

  return card;
}

/* ── Heat map ──────────────────────────────────────────────────────── */
function buildHeatmap(p) {
  const WEEKS = 24;
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // Build a date → level map from activityLog
  const dateMap = {};
  (p.activityLog || []).forEach(entry => {
    const key = entry.date;
    dateMap[key] = (dateMap[key] || 0) + 1;
  });
  const maxCount = Math.max(1, ...Object.values(dateMap));
  const level = n => n === 0 ? 0 : n < maxCount * 0.25 ? 1 : n < maxCount * 0.5 ? 2 : n < maxCount * 0.75 ? 3 : 4;

  // Start from (WEEKS * 7) days ago, aligned to Sunday
  const startDate = new Date(today);
  startDate.setDate(startDate.getDate() - WEEKS * 7);
  const dow = startDate.getDay();
  startDate.setDate(startDate.getDate() - dow); // align to Sunday

  const wrap = div('heatmap-wrap');

  // Month labels
  const monthsRow = div('heatmap-months');
  let lastMonth = -1;
  for (let w = 0; w < WEEKS; w++) {
    const colDate = new Date(startDate);
    colDate.setDate(colDate.getDate() + w * 7);
    const mo = colDate.getMonth();
    const lbl = el('span', 'heatmap-month-label', mo !== lastMonth
      ? colDate.toLocaleDateString('en-US', { month: 'short' }) : '');
    monthsRow.appendChild(lbl);
    lastMonth = mo;
  }
  wrap.appendChild(monthsRow);

  const body = div('heatmap-body');

  // Day labels
  const dayLabels = div('heatmap-days');
  ['', 'Mon', '', 'Wed', '', 'Fri', ''].forEach(d => {
    dayLabels.appendChild(el('div', 'heatmap-day-label', d));
  });
  body.appendChild(dayLabels);

  // Grid
  const grid = div('heatmap-grid');
  for (let w = 0; w < WEEKS; w++) {
    const col = div('heatmap-col');
    for (let d = 0; d < 7; d++) {
      const cellDate = new Date(startDate);
      cellDate.setDate(cellDate.getDate() + w * 7 + d);
      if (cellDate > today) {
        const empty = div('heatmap-cell');
        empty.style.visibility = 'hidden';
        col.appendChild(empty);
        continue;
      }
      const isoKey = cellDate.toISOString().slice(0, 10);
      const count = dateMap[isoKey] || 0;
      const lvl = level(count);
      const cell = div('heatmap-cell');
      cell.setAttribute('data-level', lvl);
      const notes = (p.activityLog || [])
        .filter(e => e.date === isoKey)
        .map(e => e.note)
        .join('; ');
      cell.setAttribute('data-tip', count ? `${fmtDate(isoKey)}: ${notes}` : fmtDate(isoKey));
      col.appendChild(cell);
    }
    grid.appendChild(col);
  }
  body.appendChild(grid);
  wrap.appendChild(body);

  // Legend
  const legend = div('heatmap-legend');
  legend.appendChild(el('span', '', 'Less'));
  [0, 1, 2, 3, 4].forEach(l => {
    const c = div('legend-cell');
    c.style.background = ['var(--heat0)','var(--heat1)','var(--heat2)','var(--heat3)','var(--heat4)'][l];
    legend.appendChild(c);
  });
  legend.appendChild(el('span', '', 'More'));
  wrap.appendChild(legend);
  return wrap;
}

/* ── Timeline ──────────────────────────────────────────────────────── */
function buildTimeline(projects) {
  // Flatten and sort all activity entries
  const entries = [];
  projects.forEach(p => {
    (p.activityLog || []).forEach(e => {
      entries.push({ date: e.date, note: e.note, project: p.name, status: p.status });
    });
  });
  entries.sort((a, b) => b.date.localeCompare(a.date));

  const timeline = div('timeline');
  entries.forEach(e => {
    const entry = div('timeline-entry');
    const left = div('timeline-left');
    left.appendChild(el('span', 'timeline-date', fmtDate(e.date)));
    entry.appendChild(left);

    const dotCol = div('timeline-dot-col');
    dotCol.appendChild(div(`timeline-dot ${e.status}`));
    entry.appendChild(dotCol);

    const content = div('timeline-content');
    content.appendChild(el('div', 'timeline-project', e.project));
    content.appendChild(el('div', 'timeline-note', e.note));
    entry.appendChild(content);

    timeline.appendChild(entry);
  });
  return timeline;
}

/* ── Main render ───────────────────────────────────────────────────── */
async function render(data) {
  const app = document.getElementById('app');

  // Header
  const header = div('header');
  const left = div('header-left');
  left.appendChild(el('h1', '', 'Dev Project Tracker'));
  left.appendChild(el('p', '', 'Automated project status &amp; activity overview'));
  header.appendChild(left);

  const meta = div('header-meta');
  const totalProjects = data.projects.length;
  const byStatus = { green: 0, amber: 0, red: 0 };
  data.projects.forEach(p => { if (byStatus[p.status] !== undefined) byStatus[p.status]++; });
  meta.innerHTML = `
    <strong>${totalProjects}</strong> project${totalProjects !== 1 ? 's' : ''}&nbsp;&nbsp;
    <span style="color:var(--green)">●</span> ${byStatus.green}&nbsp;
    <span style="color:var(--amber)">●</span> ${byStatus.amber}&nbsp;
    <span style="color:var(--red)">●</span> ${byStatus.red}
    <br>Last updated <strong>${fmtDate(data.lastUpdated)}</strong>
    <br>Owner <strong>${data.owner}</strong>
  `;
  header.appendChild(meta);
  app.appendChild(header);

  // Cards
  app.appendChild(el('div', 'section-title', 'Project Status'));
  const grid = div('cards-grid');
  data.projects.forEach(p => grid.appendChild(buildCard(p)));
  app.appendChild(grid);

  // Heat maps
  app.appendChild(el('div', 'section-title', 'Activity Heat Map'));
  const hmSection = div('heatmap-section');
  data.projects.forEach(p => {
    const row = div('heatmap-project');
    const hdr = div('heatmap-project-header');
    hdr.appendChild(el('span', 'heatmap-label', p.name));
    hdr.appendChild(el('span', `pill ${p.status}`, statusLabel(p.status)));
    row.appendChild(hdr);
    row.appendChild(buildHeatmap(p));
    hmSection.appendChild(row);
  });
  app.appendChild(hmSection);

  // Timeline
  app.appendChild(el('div', 'section-title', 'Activity Timeline'));
  const tlSection = div('timeline-section');
  tlSection.appendChild(buildTimeline(data.projects));
  app.appendChild(tlSection);

  // Footer
  const footer = div('footer');
  footer.innerHTML = `
    <span>Data source: <code>projects.json</code> — update this file to refresh the tracker.</span>
    <span>Rendered ${new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' })}</span>
  `;
  app.appendChild(footer);
}

/* ── Bootstrap ─────────────────────────────────────────────────────── */
(async () => {
  try {
    const res = await fetch('./projects.json?_=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    await render(data);
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent =
      `Failed to load projects.json: ${e.message}. ` +
      `If opening locally, serve via a local server (e.g. "npx serve ." or VS Code Live Server).`;
  }
})();
</script>
</body>
</html>
